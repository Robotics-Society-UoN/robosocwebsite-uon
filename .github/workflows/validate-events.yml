name: Validate events data

on:
  push:
    paths:
      - "data/**"
      - "scripts/validate-events.mjs"
      - ".github/workflows/validate-events.yml"
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate-events.mjs"
      - ".github/workflows/validate-events.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate-events.mjs
